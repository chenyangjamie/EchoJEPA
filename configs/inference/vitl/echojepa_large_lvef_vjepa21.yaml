# INFERENCE CONFIG -- backbone swapped to V-JEPA 2.1 (vjepa21_vitl_mimic_pt117)
app: vjepa
cpus_per_task: 32
# Output folder for inference logs (separate from training to avoid overwrite)
folder: /raid2/nextgen/new_projects/EchoJEPA/experiments/echonet_lvef_vjepa21_inference
mem_per_gpu: 80G
nodes: 1
tasks_per_node: 8
num_workers: 8

# Use the same evaluation infrastructure
eval_name: video_classification_frozen
resume_checkpoint: true # <--- CHANGE THIS TO TRUE, OTHERWISE RANDOM WEIGHTS
# Use a new tag for inference results
tag: echojepa-vitl-vjepa21-lvef-inference-test-set

# --- CRITICAL INFERENCE SETTINGS ---
val_only: true
# Path where the predictions CSV will be saved
predictions_save_path: /raid2/nextgen/new_projects/EchoJEPA/experiments/echonet_lvef_vjepa21_inference/test_predictions.csv

# POINT THIS TO YOUR TRAINED PROBE CHECKPOINT
probe_checkpoint: /raid2/nextgen/new_projects/EchoJEPA/experiments/echonet_lvef_vjepa21/video_classification_frozen/echojepa-vitl-vjepa21-echonet-dynamic-lvef/best.pt

experiment:
  classifier:
    task_type: regression
    num_heads: 16
    num_probe_blocks: 4
    num_targets: 1

  data:
    dataset_type: VideoDataset
    # Point 'dataset_val' to your TEST CSV
    dataset_val:   /raid2/nextgen/new_projects/EchoJEPA/data/csv/echonet_dynamic_test.csv
    dataset_train: /raid2/nextgen/new_projects/EchoJEPA/data/csv/echonet_dynamic_test.csv

    resolution: 112
    frames_per_clip: 16
    frame_step: 2
    num_segments: 2
    num_views_per_segment: 1

    target_mean: 55.7776
    target_std: 12.4064

  optimization:
    # You can increase batch size for inference since gradients are off
    batch_size: 32

    # Zero out learning rates for safety (though val_only prevents updates anyway)
    multihead_kwargs:
    - final_lr: 0.0
      final_weight_decay: 0.0
      lr: 0.0
      start_lr: 0.0
      warmup: 0.0
      weight_decay: 0.0

    num_epochs: 1 # Run once
    use_bfloat16: true
    use_pos_embed: false

model_kwargs:
  checkpoint: "/raid2/nextgen/new_projects/EchoJEPA/checkpoints/vjepa 2.1/vjepa21_vitl_mimic_pt117.pt"
  module_name: evals.video_classification_frozen.modelcustom.vit_encoder_multiclip
  pretrain_kwargs:
    encoder:
      checkpoint_key: target_encoder
      # Must match the backbone loading used during probe training. The current
      # probe was trained with the default final norm, so this stays disabled.
      # Uncomment ONLY if the probe was (re)trained with final_norm_key enabled.
      # final_norm_key: norms_block.3
      img_temporal_dim_size: null
      model_name: vit_large
      patch_size: 16
      tubelet_size: 2
      uniform_power: true
      use_rope: true
  wrapper_kwargs:
    max_frames: 128
    use_pos_embed: false
